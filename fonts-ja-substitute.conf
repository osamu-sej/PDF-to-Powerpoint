<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Windows の日本語フォント名を、サーバーにインストール済みの
  Noto Sans/Serif CJK JP に対応付ける設定。
  LibreOffice が PDF インポート時に文字幅を正しく計測できるようになり、
  テキストの位置・折り返しの精度が向上する。
-->
<fontconfig>
  <!-- ゴシック系 → Noto Sans CJK JP -->
  <alias><family>Meiryo</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>Meiryo UI</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>MeiryoUI</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>Yu Gothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>Yu Gothic UI</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>YuGothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>MS Gothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>MS PGothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>MS UI Gothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>ＭＳ ゴシック</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>ＭＳ Ｐゴシック</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>BIZ UDGothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>BIZ UDPGothic</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>UD Digi Kyokasho N-R</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>UD Digi Kyokasho NP-R</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>UD Digi Kyokasho NK-R</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>Hiragino Kaku Gothic ProN</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>
  <alias><family>Hiragino Sans</family><prefer><family>Noto Sans CJK JP</family></prefer></alias>

  <!-- 明朝系 → Noto Serif CJK JP -->
  <alias><family>Yu Mincho</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>YuMincho</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>MS Mincho</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>MS PMincho</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>ＭＳ 明朝</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>ＭＳ Ｐ明朝</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>BIZ UDMincho</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>
  <alias><family>Hiragino Mincho ProN</family><prefer><family>Noto Serif CJK JP</family></prefer></alias>

  <!-- 欧文 Windows フォント → メトリック互換フォント -->
  <alias><family>Arial</family><prefer><family>Liberation Sans</family></prefer></alias>
  <alias><family>Helvetica</family><prefer><family>Liberation Sans</family></prefer></alias>
  <alias><family>Times New Roman</family><prefer><family>Liberation Serif</family></prefer></alias>
  <alias><family>Courier New</family><prefer><family>Liberation Mono</family></prefer></alias>
  <alias><family>Calibri</family><prefer><family>Carlito</family></prefer></alias>
  <alias><family>Cambria</family><prefer><family>Caladea</family></prefer></alias>
  <alias><family>Segoe UI</family><prefer><family>Liberation Sans</family></prefer></alias>
</fontconfig>
