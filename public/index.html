<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to PPTX Converter</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           変数定義 (Color Variables)
           ========================================= */
        :root {
            --primary: #FF7E5F;
            --secondary: #FEB47B;
            --accent: #8B5CF6;
            --bg-color: #FFF5F2; /* 薄いグレー（少し赤みのある温かいグレー） */
            --text-color: #4B5563;
        }

        /* =========================================
           基本設定 (Base Styles)
           ========================================= */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* コンテナ（白いカード部分）
           影を柔らかくし、境界をなじませています
        */
        .container {
            background: white;
            width: 100%;
            max-width: 480px;
            padding: 3rem 2.5rem;
            border-radius: 35px;
            /* 全方向に淡く広げて境界をぼかす柔らかい影 */
            box-shadow: 0 0 70px rgba(0, 0, 0, 0.08);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        p.subtitle {
            font-size: 0.95rem;
            color: #888;
            margin-bottom: 2.5rem;
        }

        /* =========================================
           アニメーションステージ (Magic Stage)
           ========================================= */
        .magic-stage {
            /* ★修正点：画像のサイズダウンに合わせて高さを少し調整 */
            height: 160px; 
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        /* PDF画像の設定 
           ★修正点：画像を270pxから220pxに縮小しました
        */
        img.doc {
            width: 220px; 
            height: auto;
            position: absolute;
            z-index: 10;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
            object-fit: contain;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 完成後のPPTアイコン設定
        */
        .ppt-doc {
            width: 100px;
            height: 120px;
            background: #F97316;
            border-radius: 12px;
            transform: scale(0);
            opacity: 0;
            z-index: 20;
            box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            position: absolute;
        }
        
        .ppt-doc::after { 
            content: "PPTX"; 
            font-size: 1.5rem; 
        }

        /* =========================================
           飛び出すパーツの設定 (Flying Parts)
           ========================================= */
        .part {
            position: absolute;
            background: var(--accent);
            opacity: 0;
            border-radius: 4px;
        }

        .part.rect { 
            width: 35px;
            height: 25px; 
            border-radius: 4px; 
        }

        .part.circle { 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
        }

        .part.text { 
            width: 50px; 
            height: 12px; 
            background: #ccc; 
        }

        /* =========================================
           キーフレームアニメーション (Keyframes)
           ========================================= */
        
        /* 1. PDF画像がブルブル震えて消える */
        .converting img.doc { 
            animation: shakeAndBreak 1.5s forwards; 
        }

        @keyframes shakeAndBreak {
            0% { 
                transform: translateX(0) scale(1); 
            }
            10%, 30%, 50% { 
                transform: translateX(-7px) scale(1.02); 
            }
            20%, 40%, 60% { 
                transform: translateX(7px) scale(1.02); 
            }
            70% { 
                transform: scale(1.2); 
                opacity: 0.8; 
            }
            100% { 
                transform: scale(0); 
                opacity: 0; 
            }
        }

        /* 2. パーツが飛び回るアニメーション */
        .converting .part { 
            animation: partsFly 3s infinite ease-in-out 0.5s; 
        }

        @keyframes partsFly {
            0% { 
                opacity: 0; 
                transform: translate(0,0) scale(0.5) rotate(0deg); 
            }
            20% { 
                opacity: 1; 
                transform: translate(var(--tx), var(--ty)) scale(1) rotate(var(--r)); 
            }
            80% { 
                opacity: 1; 
                transform: translate(0,0) scale(0.8) rotate(0deg); 
                border-radius: 50%; 
                background: var(--secondary); 
            }
            100% { 
                opacity: 0; 
                transform: scale(0); 
            }
        }

        /* 各パーツの軌道設定 */
        .p1 { 
            --tx: -70px; 
            --ty: -60px; 
            --r: 45deg; 
        }
        .p2 { 
            --tx: 70px; 
            --ty: -50px; 
            --r: -60deg; 
            animation-delay: 0.7s !important; 
        }
        .p3 { 
            --tx: -50px; 
            --ty: 70px; 
            --r: 90deg; 
            animation-delay: 0.9s !important; 
        }
        .p4 { 
            --tx: 60px; 
            --ty: 60px; 
            --r: -30deg; 
            animation-delay: 1.1s !important; 
        }

        /* 3. PPTが出現するアニメーション */
        .finished .ppt-doc { 
            animation: pptAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; 
        }

        @keyframes pptAppear {
            0% { 
                transform: scale(0) rotate(-30deg); 
                opacity: 0; 
            }
            100% { 
                transform: scale(1) rotate(0deg); 
                opacity: 1; 
            }
        }

        /* =========================================
           フォーム要素 (Forms & Buttons)
           ========================================= */
        .upload-box {
            border: 3px dashed #FFD1C1;
            border-radius: 20px;
            padding: 2rem;
            cursor: pointer;
            transition: 0.3s;
            background: #FFFBF9;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .upload-box:hover, .upload-box.dragover {
            border-color: var(--primary);
            background: #FFF0EB;
            transform: translateY(-2px);
        }
        
        .file-name {
            font-weight: 700;
            color: var(--primary);
            word-break: break-all;
        }

        .btn-magic {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 2rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(255, 126, 95, 0.3);
            transition: 0.3s;
        }

        .btn-magic:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(255, 126, 95, 0.4);
        }

        .btn-magic:disabled {
            background: #ccc;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* =========================================
           進捗バー (Progress Bar)
           ========================================= */
        .progress-section {
            display: none;
            margin-top: 30px;
        }

        .progress-track {
            background: #eee;
            height: 14px;
            border-radius: 7px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 7px;
            transition: width 0.2s linear; /* 一定速度でスムーズに動く */
            position: relative;
            overflow: hidden;
        }

        /* 縞模様のアニメーション */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; 
            left: 0; 
            bottom: 0; 
            right: 0;
            background-image: linear-gradient(
                45deg, 
                rgba(255,255,255,.2) 25%, 
                transparent 25%, 
                transparent 50%, 
                rgba(255,255,255,.2) 50%, 
                rgba(255,255,255,.2) 75%, 
                transparent 75%, 
                transparent
            );
            background-size: 20px 20px;
            animation: stripeMove 1s linear infinite;
        }

        @keyframes stripeMove { 
            from { background-position: 0 0; } 
            to { background-position: 20px 20px; } 
        }
        
        .status-msg {
            margin-top: 12px;
            font-weight: 700;
            color: var(--primary);
            min-height: 1.5em;
        }

        /* =========================================
           入力切替タブ (Source Tabs)
           ========================================= */
        .source-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 1.2rem;
        }

        .source-tab {
            flex: 1;
            padding: 0.7rem;
            border: 2px solid #FFD1C1;
            border-radius: 14px;
            background: #FFFBF9;
            color: var(--text-color);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .source-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
        }

        .url-box {
            display: none;
        }

        .url-box input {
            width: 100%;
            box-sizing: border-box;
            padding: 1.1rem 1.2rem;
            border: 3px dashed #FFD1C1;
            border-radius: 20px;
            background: #FFFBF9;
            font-size: 1rem;
            font-family: inherit;
            color: var(--text-color);
            outline: none;
            transition: 0.3s;
        }

        .url-box input:focus {
            border-color: var(--primary);
            background: #FFF0EB;
        }

        /* =========================================
           詳細オプション (Advanced Options)
           ========================================= */
        details.options {
            margin-top: 1.2rem;
            text-align: left;
            background: #FFFBF9;
            border-radius: 14px;
            padding: 0.8rem 1.2rem;
            font-size: 0.88rem;
        }

        details.options summary {
            cursor: pointer;
            font-weight: 700;
            color: #888;
        }

        .opt-group {
            margin-top: 0.8rem;
        }

        .opt-group .opt-label {
            font-weight: 700;
            color: #666;
            display: block;
            margin-bottom: 4px;
        }

        .opt-group label {
            margin-right: 14px;
            cursor: pointer;
        }

        /* =========================================
           バージョンバッジ (Version Badge)
           ========================================= */
        .version-badge {
            position: absolute;
            bottom: 14px;
            right: 22px;
            font-size: 0.75rem;
            color: #bbb;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PPTX Converter</h1>
        <p class="subtitle">PDF・HTML・Word・Excel・画像・Webページを<br>編集可能なPowerPointに変換します</p>

        <div class="magic-stage" id="stage">
            <img src="pdf-image.png" class="doc" alt="PDF">
            
            <div class="part rect p1"></div>
            <div class="part circle p2"></div>
            <div class="part text p3"></div>
            <div class="part rect p4"></div>
            <div class="doc ppt-doc"></div>
        </div>

        <form id="convertForm">
            <div class="source-tabs">
                <button type="button" class="source-tab active" id="tabFile">📄 ファイル</button>
                <button type="button" class="source-tab" id="tabUrl">🌐 Webページ (URL)</button>
            </div>

            <label class="upload-box" id="dropZone">
                <input type="file" name="file" id="fileInput"
                       accept=".pdf,.html,.htm,.doc,.docx,.odt,.rtf,.txt,.xls,.xlsx,.ods,.csv,.ppt,.odp,.png,.jpg,.jpeg,.gif,.bmp,.webp,.svg" hidden>
                <span style="font-size: 3rem; line-height: 1;">📂</span>
                <span id="dropText">変換したいファイルをここにドロップ<br><small style="color: var(--primary);">PDF / HTML / Word / Excel / 画像 など</small></span>
                <div class="file-name" id="fileNameDisplay" style="display: none;"></div>
            </label>

            <div class="url-box" id="urlBox">
                <input type="url" id="urlInput" placeholder="https://example.com/page.html">
            </div>

            <details class="options" id="optionsBox">
                <summary>⚙️ 詳細オプション</summary>
                <div class="opt-group">
                    <span class="opt-label">フォント</span>
                    <label><input type="radio" name="fontMode" value="auto" checked> 元のフォントを保持（推奨）</label>
                    <label><input type="radio" name="fontMode" value="unify"> Meiryo UI に統一</label>
                </div>
                <div class="opt-group">
                    <span class="opt-label">文字サイズ</span>
                    <label><input type="radio" name="sizeMode" value="keep" checked> 原寸を維持（推奨）</label>
                    <label><input type="radio" name="sizeMode" value="shrink"> 一段階小さくする</label>
                </div>
            </details>

            <div class="progress-section" id="progressSection">
                <div class="progress-track">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="status-msg" id="statusMsg">準備中...</div>
            </div>

            <button type="submit" class="btn-magic" id="submitBtn">魔法をかけて変換する ✨</button>
        </form>

        <div class="version-badge" id="versionBadge" title="サーバーで動作中のバージョン"></div>
    </div>

    <script>
        // =========================================
        // DOM要素の取得
        // =========================================
        const stage = document.getElementById('stage');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const dropText = document.getElementById('dropText');
        const submitBtn = document.getElementById('submitBtn');
        const progressSection = document.getElementById('progressSection');
        const progressBar = document.getElementById('progressBar');
        const statusMsg = document.getElementById('statusMsg');
        const form = document.getElementById('convertForm');
        const tabFile = document.getElementById('tabFile');
        const tabUrl = document.getElementById('tabUrl');
        const urlBox = document.getElementById('urlBox');
        const urlInput = document.getElementById('urlInput');
        const optionsBox = document.getElementById('optionsBox');

        let sourceMode = 'file'; // 'file' or 'url'

        // =========================================
        // 入力ソース切替（ファイル / URL）
        // =========================================
        function setSourceMode(mode) {
            sourceMode = mode;
            tabFile.classList.toggle('active', mode === 'file');
            tabUrl.classList.toggle('active', mode === 'url');
            dropZone.style.display = mode === 'file' ? 'flex' : 'none';
            urlBox.style.display = mode === 'url' ? 'block' : 'none';
        }
        tabFile.addEventListener('click', () => setSourceMode('file'));
        tabUrl.addEventListener('click', () => setSourceMode('url'));

        // =========================================
        // バージョン表示（サーバーから取得するため、
        // 実際にデプロイされているバージョンが表示される）
        // =========================================
        fetch('/version')
            .then(r => r.json())
            .then(info => {
                document.getElementById('versionBadge').textContent = `v${info.version}`;
            })
            .catch(() => {
                // 旧バージョンのサーバーには /version が無い
                document.getElementById('versionBadge').textContent = '旧バージョン';
            });

        // =========================================
        // ファイル選択処理
        // =========================================
        function handleFileSelect(file) {
            if (!file) return;
            
            // DataTransferを使ってinput要素にファイルを正しく紐付ける
            const dt = new DataTransfer();
            dt.items.add(file);
            fileInput.files = dt.files;

            // UI更新
            fileNameDisplay.textContent = `✅ ${file.name}`;
            fileNameDisplay.style.display = 'block';
            dropText.style.display = 'none';
            dropZone.querySelector('span[style]').style.display = 'none';
        }

        // =========================================
        // ドラッグ＆ドロップ制御
        // =========================================
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => { 
                ev.preventDefault(); 
                ev.stopPropagation(); 
            });
        });

        dropZone.addEventListener('drop', (e) => {
            handleFileSelect(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // =========================================
        // 送信ボタンクリック時の処理
        // =========================================
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 入力チェック
            let originalFileName;
            if (sourceMode === 'file') {
                if (!fileInput.files || fileInput.files.length === 0) {
                    alert('変換したいファイルを選択してください！');
                    return;
                }
                originalFileName = fileInput.files[0].name;
            } else {
                if (!urlInput.value || !/^https?:\/\//i.test(urlInput.value)) {
                    alert('https:// から始まるURLを入力してください！');
                    return;
                }
                try {
                    originalFileName = new URL(urlInput.value).hostname + '.pptx';
                } catch (err) {
                    originalFileName = 'webpage.pptx';
                }
            }

            // 選択中のオプションを取得
            const fontMode = form.querySelector('input[name="fontMode"]:checked').value;
            const sizeMode = form.querySelector('input[name="sizeMode"]:checked').value;

            // UIの切り替え（ボタン非表示、バー表示）
            submitBtn.disabled = true;
            submitBtn.style.display = 'none';
            dropZone.style.display = 'none';
            urlBox.style.display = 'none';
            optionsBox.style.display = 'none';
            document.querySelector('.source-tabs').style.display = 'none';
            progressSection.style.display = 'block';
            
            // アニメーション開始
            stage.classList.remove('finished');
            stage.classList.add('converting');

            // =========================================
            // 進捗バーの制御ロジック (超低速・均等進行)
            // =========================================
            let progress = 0;
            
            // 速度設定: 0.2秒ごとに0.2%進む
            // 計算: 1秒で1%進む => 100%まで100秒
            const increment = 0.2; 
            
            const timer = setInterval(() => {
                // 95%までは一定速度で進む
                if (progress < 95) {
                    progress += increment;
                } else {
                    // 95%以降は完了信号が来るまでゆっくり待機
                    progress += 0.02;
                }
                
                // 99%でキャップ（完了待ち）
                if (progress >= 99) progress = 99;

                // バーの幅を更新
                progressBar.style.width = `${progress}%`;
                
                // メッセージの更新 (進捗率に応じた条件分岐)
                let currentMsg = "PDFを解析して分解しています...";
                
                if (progress > 15) currentMsg = "図形やテキストを抽出中...";
                if (progress > 30) currentMsg = "編集可能なパーツに変換しています...";
                if (progress > 50) currentMsg = "PowerPointのスライドを構築中..."; 
                if (progress > 70) currentMsg = "レイアウトとフォントを調整中...";
                if (progress > 85) currentMsg = "仕上げの処理を行っています...";
                
                // 95%を超えて初めて「間もなく」を表示
                if (progress > 95) currentMsg = "間もなく完成します。少々お待ちください...";

                statusMsg.textContent = currentMsg;

            }, 200);

            // =========================================
            // サーバー通信 (Fetch API)
            // =========================================
            try {
                let response;
                if (sourceMode === 'file') {
                    const formData = new FormData();
                    formData.append('file', fileInput.files[0]);
                    formData.append('fontMode', fontMode);
                    formData.append('sizeMode', sizeMode);
                    response = await fetch('/convert', {
                        method: 'POST',
                        body: formData
                    });
                } else {
                    response = await fetch('/convert-url', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ url: urlInput.value, fontMode, sizeMode })
                    });
                }

                if (!response.ok) throw new Error('Server Error');

                // --- 完了処理 ---
                clearInterval(timer);
                
                // バーを即座に100%にする
                progressBar.style.width = '100%';
                statusMsg.textContent = "変換成功！ダウンロードします🎉";
                
                // アニメーション終了（PPT出現）
                stage.classList.remove('converting');
                stage.classList.add('finished');

                // ファイルダウンロード処理
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                
                // ファイル名の処理 (文字化け対策済み)
                let downloadName = originalFileName.replace(/\.[^.]+$/, '') + '.pptx';
                try { 
                    downloadName = decodeURIComponent(downloadName); 
                } catch(e) {}
                
                a.download = downloadName;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);

                // 5秒後に画面リロード
                setTimeout(() => {
                    window.location.reload();
                }, 5000);

            } catch (err) {
                clearInterval(timer);
                alert('変換に失敗しました。もう一度お試しください。');
                window.location.reload();
            }
        });
    </script>
</body>
</html>
